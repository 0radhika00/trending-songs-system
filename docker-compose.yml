services:

  nginx:
    image: nginx
    ports:
      - "8080:80"           # expose to your host machine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api

  redis:
    image: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s
  
  seeder:                              # ← runs once, populates MongoDB, then exits
    build: .
    command: python data_generate.py
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app
    restart: "no" 

  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app

  consumer:
    restart: always
    build: .
    command: python messageQ/consumer.py
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app
    

  producer:
    restart: always
    build: .
    command: python messageQ/producer.py
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app
   